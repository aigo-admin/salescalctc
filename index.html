<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher & Commission Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Voucher & Commission Calculator</h1>
    <p class="subtitle">
        Calculate voucher discounts, salesman commissions and final revenue.
    </p>

    <div class="grid">

        <div class="field">
            <label>Original Product Price (₹)</label>
            <input type="number" id="price" placeholder="5000">
        </div>

        <div class="field">
            <label>Voucher Type</label>
            <select id="voucherType">
                <option value="percentage">Percentage Discount (%)</option>
                <option value="fixed">Fixed Discount (₹)</option>
            </select>
        </div>

        <div class="field">
            <label>Voucher Value</label>
            <input type="number" id="voucherValue" placeholder="60">
        </div>

        <div class="field">
            <label>Salesman Commission (%)</label>
            <input type="number" id="commission" placeholder="10">
        </div>

        <button onclick="calculate()">Calculate</button>

    </div>

    <div class="results">

        <div class="card">
            <div class="card-title">Original Price</div>
            <div class="card-value blue" id="originalPrice">₹0</div>
        </div>

        <div class="card">
            <div class="card-title">Discount Given</div>
            <div class="card-value red" id="discountAmount">₹0</div>
        </div>

        <div class="card">
            <div class="card-title">Selling Price</div>
            <div class="card-value orange" id="sellingPrice">₹0</div>
        </div>

        <div class="card">
            <div class="card-title">Salesman Commission</div>
            <div class="card-value" id="commissionAmount">₹0</div>
        </div>

        <div class="card">
            <div class="card-title">Your Revenue</div>
            <div class="card-value green" id="finalRevenue">₹0</div>
        </div>

    </div>

    <div class="breakdown" id="breakdown">
        Enter values and click Calculate.
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
